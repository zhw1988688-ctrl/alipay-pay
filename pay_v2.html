<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>向商户付款</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F5F5; min-height: 100vh;
        }
        .header {
            background: #fff; padding: 12px 16px; display: flex;
            align-items: center; border-bottom: 1px solid #eee;
        }
        .back { font-size: 22px; color: #333; width: 30px; }
        .title { flex: 1; text-align: center; font-size: 17px; color: #333; font-weight: 500; }
        .more { width: 30px; text-align: right; font-size: 18px; color: #333; }
        .merchant {
            background: #fff; padding: 20px 16px; display: flex;
            align-items: center; margin-top: 10px;
        }
        .icon {
            width: 40px; height: 40px; border-radius: 50%; background: #1677FF;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px; margin-right: 12px;
        }
        .name { font-size: 16px; color: #333; }
        .amount-area {
            background: #fff; padding: 30px 16px; margin-top: 1px; text-align: center;
        }
        .label { font-size: 14px; color: #999; margin-bottom: 15px; }
        .input-wrap {
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #1677FF; padding-bottom: 10px; margin: 0 30px;
        }
        .symbol { font-size: 32px; color: #333; margin-right: 8px; }
        #amountInput {
            border: none; outline: none; font-size: 48px; color: #333;
            width: 60%; text-align: left; background: transparent;
        }
        #amountInput::placeholder { color: #ccc; font-size: 22px; }
        .note {
            background: #fff; padding: 14px 16px; margin-top: 1px;
            font-size: 14px; color: #999;
        }
        .keyboard {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #D1D5DB; padding: 1px; display: grid;
            grid-template-columns: repeat(4, 1fr); gap: 1px;
            user-select: none;
        }
        .key {
            background: #fff; height: 56px; display: flex;
            align-items: center; justify-content: center;
            font-size: 24px; color: #333; border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .key:active { background: #e0e0e0; }
        .confirm {
            background: #1677FF !important; color: #fff !important;
            font-size: 17px !important; grid-row: span 2; height: auto;
        }
        .confirm:active { background: #0958D9 !important; }

        /* 确认页面 */
        #confirmPage {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #fff; flex-direction: column; align-items: center;
            padding: 40px 20px 20px; z-index: 100; overflow-y: auto;
        }
        #confirmPage.show { display: flex; }
        .c-header {
            background: #1677FF; color: #fff; width: 100%; text-align: center;
            padding: 40px 20px; border-radius: 0 0 20px 20px; margin-bottom: 20px;
        }
        .c-merchant { font-size: 16px; opacity: 0.9; margin-bottom: 10px; }
        .c-amount { font-size: 48px; font-weight: bold; }
        .c-currency { font-size: 24px; }
        .c-rate {
            margin-top: 15px; font-size: 14px; opacity: 0.8;
            background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 16px;
            display: inline-block;
        }
        .qr-section {
            margin-top: 20px; text-align: center; width: 100%;
        }
        .qr-label { font-size: 16px; color: #333; margin-bottom: 15px; font-weight: 500; }
        .qr-img {
            width: 220px; height: 220px; border: 2px solid #1677FF;
            border-radius: 12px; padding: 10px; background: #fff;
        }
        .tips {
            margin-top: 20px; font-size: 14px; color: #666;
            text-align: center; line-height: 1.8; padding: 0 20px;
        }
        .tips b { color: #1677FF; }
        .back-btn {
            margin-top: 30px; padding: 12px 40px; background: #f5f5f5;
            border: 1px solid #ddd; border-radius: 24px; font-size: 15px;
            color: #333; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="inputPage">
    <div class="header">
        <div class="back">&#8249;</div>
        <div class="title">向商户付款</div>
        <div class="more">&#8942;</div>
    </div>
    <div class="merchant">
        <div class="icon">收</div>
        <div class="name">收银台</div>
    </div>
    <div class="amount-area">
        <div class="label">请输入人民币金额</div>
        <div class="input-wrap">
            <span class="symbol">&#165;</span>
            <input type="number" id="amountInput" placeholder="请输入金额" step="0.01">
        </div>
    </div>
    <div class="note">金额将以人民币计算，支付时请参考对应越南盾</div>

    <div class="keyboard">
        <button class="key" onclick="append('1')">1</button>
        <button class="key" onclick="append('2')">2</button>
        <button class="key" onclick="append('3')">3</button>
        <button class="key" onclick="del()">&#8592; &#215;</button>

        <button class="key" onclick="append('4')">4</button>
        <button class="key" onclick="append('5')">5</button>
        <button class="key" onclick="append('6')">6</button>
        <button class="key confirm" onclick="goConfirm()">确认<br>支付</button>

        <button class="key" onclick="append('7')">7</button>
        <button class="key" onclick="append('8')">8</button>
        <button class="key" onclick="append('9')">9</button>

        <button class="key" onclick="append('0')" style="grid-column: 1 / span 2;">0</button>
        <button class="key" onclick="append('.')">.</button>
    </div>
</div>

<div id="confirmPage">
    <div class="c-header">
        <div class="c-merchant">向商户付款</div>
        <div class="c-amount"><span class="c-currency">&#165;</span><span id="cAmount"></span></div>
        <div class="c-rate" id="cRate"></div>
    </div>

    <div class="qr-section">
        <div class="qr-label">请使用支付宝扫描下方二维码</div>
        <img id="qrImg" class="qr-img" src="" alt="支付宝收款码">
    </div>

    <div class="tips">
        <b>操作步骤：</b><br>
        1. 长按上方二维码，选择“识别图中二维码”<br>
        2. 跳转到支付宝后，输入页面显示的越南盾金额<br>
        3. 完成支付
    </div>

    <button class="back-btn" onclick="backToInput()">返回修改金额</button>
</div>

<script>
    // 支付宝收款链接（你的原二维码内容）
    const ALIPAY_URL = 'https://render-intl.alipay.com/p/yuyan/180020010001251202/nationalQR.html?caprMode=sync&queryType=PUSH_PAYMENT&region=SG&tntInstId=GNETW7CN&codeValue=00020101021138600010A000000727013000069710130116FV6021VCK4FSLDIA0208QRIBFTTA5204739953037045802VN63040D74&issuer=305Y367YSG5QB000740&appId=MOBILE_FRONTEND_AC&asyncDecode=false';

    function append(n) {
        var input = document.getElementById('amountInput');
        if (n === '.' && input.value.includes('.')) return;
        if (input.value.length > 8) return;
        input.value += n;
    }
    function del() {
        var input = document.getElementById('amountInput');
        input.value = input.value.slice(0, -1);
    }
    function goConfirm() {
        var amt = document.getElementById('amountInput').value;
        if (!amt || parseFloat(amt) <= 0) {
            alert('请输入金额');
            return;
        }
        document.getElementById('inputPage').style.display = 'none';
        document.getElementById('confirmPage').classList.add('show');
        document.getElementById('cAmount').textContent = amt;

        // 汇率计算（人民币→越南盾，可根据实际汇率调整）
        var rate = 3500;
        var vnd = Math.round(parseFloat(amt) * rate).toLocaleString();
        document.getElementById('cRate').textContent = '约合 ' + vnd + ' 越南盾';

        // 生成支付宝收款码二维码图片
        var encoded = encodeURIComponent(ALIPAY_URL);
        document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encoded;
    }
    function backToInput() {
        document.getElementById('confirmPage').classList.remove('show');
        document.getElementById('inputPage').style.display = 'block';
    }
</script>

</body>
</html>
